<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夜市学堂 - 生物化学AI教学</title>
<style>
:root {
  --bg: #1a1a2e;
  --bg2: #16213e;
  --bg3: #0f3460;
  --card: #1e2a4a;
  --orange: #f39c12;
  --orange-glow: #f7b733;
  --blue: #3498db;
  --blue-glow: #5dade2;
  --green: #2ecc71;
  --red: #e74c3c;
  --text: #e8e8e8;
  --text2: #a0a0b8;
  --border: #2a3a5c;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
  overflow-x: hidden;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--orange); border-radius: 3px; }

/* Neon glow text */
.neon-text {
  color: var(--orange);
  text-shadow: 0 0 10px rgba(243,156,18,0.6), 0 0 20px rgba(243,156,18,0.3);
  animation: neonPulse 2s ease-in-out infinite alternate;
}
@keyframes neonPulse {
  from { text-shadow: 0 0 10px rgba(243,156,18,0.6), 0 0 20px rgba(243,156,18,0.3); }
  to { text-shadow: 0 0 15px rgba(243,156,18,0.8), 0 0 30px rgba(243,156,18,0.5), 0 0 45px rgba(243,156,18,0.3); }
}

/* Header */
.header {
  background: linear-gradient(135deg, var(--bg2), var(--bg3));
  padding: 16px 20px;
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 2px solid var(--border);
  box-shadow: 0 2px 20px rgba(0,0,0,0.4);
}
.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.logo {
  font-size: 1.5rem;
  font-weight: 800;
  letter-spacing: 2px;
}
.logo span { color: var(--blue); }

/* Nav tabs */
.nav-tabs {
  display: flex;
  gap: 4px;
  background: var(--bg);
  border-radius: 28px;
  padding: 4px;
}
.nav-tab {
  padding: 8px 20px;
  border-radius: 24px;
  border: none;
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  font-size: 0.95rem;
  font-weight: 600;
  transition: var(--transition);
  white-space: nowrap;
}
.nav-tab.active {
  background: var(--orange);
  color: #1a1a2e;
  box-shadow: 0 0 15px rgba(243,156,18,0.4);
}
.nav-tab:hover:not(.active) { color: var(--orange); }

/* Settings button */
.settings-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 16px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 0.85rem;
  transition: var(--transition);
}
.settings-btn:hover { border-color: var(--orange); color: var(--orange); }

/* Main container */
.main-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
@media (max-width: 768px) {
  .main-container { grid-template-columns: 1fr; }
  .header-inner { justify-content: center; }
}

/* Section cards */
.section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: var(--transition);
}
.section-header {
  background: linear-gradient(135deg, var(--bg3), var(--bg2));
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  user-select: none;
}
.section-header h2 {
  font-size: 1.1rem;
  font-weight: 700;
  flex: 1;
}
.section-header .icon { font-size: 1.3rem; }
.section-body { padding: 16px 20px; display: none; }
.section.open .section-body { display: block; }
.section.open .section-header .arrow { transform: rotate(180deg); }
.arrow { transition: var(--transition); }

/* Knowledge Cards */
.knowledge-list { display: flex; flex-direction: column; gap: 10px; max-height: 500px; overflow-y: auto; }
.kcard {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  cursor: pointer;
  transition: var(--transition);
  position: relative;
}
.kcard:hover { border-color: var(--orange); transform: translateX(4px); }
.kcard.locked { opacity: 0.6; cursor: pointer; }
.kcard.locked::after {
  content: "🔒";
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 1.2rem;
}
.kcard.free::after {
  content: "🆓";
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 0.85rem;
}
.kcard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.kcard-title { font-weight: 700; font-size: 0.95rem; color: var(--orange); }
.kcard-page { font-size: 0.8rem; color: var(--text2); background: var(--bg3); padding: 2px 8px; border-radius: 10px; }
.kcard-unit { font-size: 0.78rem; color: var(--blue); margin-bottom: 4px; }
.kcard-keypoints { font-size: 0.82rem; color: var(--text2); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.kcard-detail { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
.kcard.expanded .kcard-detail { display: block; }
.kcard.expanded .kcard-keypoints { display: none; }
.detail-section { margin-bottom: 10px; }
.detail-label { font-weight: 700; color: var(--blue); font-size: 0.82rem; margin-bottom: 4px; }
.detail-text { font-size: 0.85rem; color: var(--text2); }
.tag-list { display: flex; flex-wrap: wrap; gap: 4px; }
.tag {
  background: var(--bg3);
  color: var(--blue-glow);
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 0.78rem;
}

/* Quiz inside cards */
.quiz-section { margin-top: 12px; }
.quiz-question { margin-bottom: 12px; background: var(--bg); border-radius: 8px; padding: 10px; }
.quiz-q-text { font-weight: 600; font-size: 0.88rem; margin-bottom: 8px; }
.quiz-options { display: flex; flex-direction: column; gap: 6px; }
.quiz-opt {
  padding: 8px 12px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.85rem;
  transition: var(--transition);
}
.quiz-opt:hover { border-color: var(--blue); }
.quiz-opt.correct { border-color: var(--green); background: rgba(46,204,113,0.15); color: var(--green); }
.quiz-opt.wrong { border-color: var(--red); background: rgba(231,76,60,0.15); color: var(--red); }
.quiz-feedback { font-size: 0.82rem; margin-top: 6px; padding: 8px; border-radius: 6px; display: none; }
.quiz-feedback.show { display: block; }
.quiz-feedback.correct { background: rgba(46,204,113,0.1); color: var(--green); }
.quiz-feedback.wrong { background: rgba(231,76,60,0.1); color: var(--red); }

/* AI Chat */
.chat-container {
  display: flex;
  flex-direction: column;
  height: 500px;
  background: var(--bg);
  border-radius: 10px;
  overflow: hidden;
}
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.chat-bubble {
  max-width: 85%;
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 0.88rem;
  line-height: 1.6;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.chat-bubble.bot {
  background: var(--bg2);
  border: 1px solid var(--border);
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}
.chat-bubble.user {
  background: var(--bg3);
  border: 1px solid var(--orange);
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.chat-bubble.loading {
  opacity: 0.6;
  animation: pulse 1.5s ease infinite;
}
@keyframes pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
.chat-input-area {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  background: var(--bg2);
  border-top: 1px solid var(--border);
}
.chat-input {
  flex: 1;
  padding: 10px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-size: 0.9rem;
  outline: none;
  transition: var(--transition);
}
.chat-input:focus { border-color: var(--orange); }
.chat-send {
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  background: var(--orange);
  color: #1a1a2e;
  font-weight: 700;
  cursor: pointer;
  transition: var(--transition);
}
.chat-send:hover { background: var(--orange-glow); box-shadow: 0 0 15px rgba(243,156,18,0.4); }
.chat-send:disabled { opacity: 0.5; cursor: not-allowed; }

/* Games grid */
.games-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
@media (max-width: 768px) { .games-grid { grid-template-columns: 1fr; } }
.game-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  cursor: pointer;
  transition: var(--transition);
  text-align: center;
}
.game-card:hover { border-color: var(--blue); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
.game-card.locked { opacity: 0.5; position: relative; }
.game-card.locked::after {
  content: "🔒 付费解锁";
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 0.85rem;
  color: var(--orange);
  background: var(--bg);
  padding: 6px 12px;
  border-radius: 16px;
  white-space: nowrap;
}
.game-icon { font-size: 2.5rem; margin-bottom: 8px; }
.game-name { font-weight: 700; font-size: 0.9rem; margin-bottom: 4px; }
.game-desc { font-size: 0.78rem; color: var(--text2); }

/* Game Modal */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 90vw;
  max-width: 700px;
  max-height: 85vh;
  overflow-y: auto;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
.modal-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-close {
  background: none;
  border: none;
  color: var(--text);
  font-size: 1.5rem;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
}
.modal-close:hover { background: var(--bg3); }
.modal-body { padding: 20px; }

/* Game-specific styles */
.drag-item {
  padding: 10px 16px;
  background: var(--bg3);
  border: 2px solid var(--border);
  border-radius: 8px;
  cursor: grab;
  user-select: none;
  font-size: 0.85rem;
  transition: var(--transition);
}
.drag-item:hover { border-color: var(--orange); }
.drag-item.dragging { opacity: 0.5; }
.drop-zone {
  min-height: 60px;
  border: 2px dashed var(--border);
  border-radius: 8px;
  padding: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: flex-start;
  transition: var(--transition);
}
.drop-zone.drag-over { border-color: var(--orange); background: rgba(243,156,18,0.1); }
.drop-zone .drag-item { cursor: default; }

.slider-group { margin-bottom: 16px; }
.slider-label { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 0.85rem; }
.slider-input {
  width: 100%;
  -webkit-appearance: none;
  height: 8px;
  border-radius: 4px;
  background: var(--border);
  outline: none;
}
.slider-input::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--orange);
  cursor: pointer;
}

.btn {
  padding: 10px 24px;
  border-radius: 20px;
  border: none;
  font-weight: 700;
  font-size: 0.9rem;
  cursor: pointer;
  transition: var(--transition);
}
.btn-orange { background: var(--orange); color: #1a1a2e; }
.btn-orange:hover { background: var(--orange-glow); box-shadow: 0 0 15px rgba(243,156,18,0.4); }
.btn-blue { background: var(--blue); color: #fff; }
.btn-blue:hover { background: var(--blue-glow); box-shadow: 0 0 15px rgba(52,152,219,0.4); }
.btn-outline {
  background: transparent;
  border: 1px solid var(--orange);
  color: var(--orange);
}
.btn-outline:hover { background: rgba(243,156,18,0.1); }

/* Progress bar */
.progress-bar {
  height: 8px;
  background: var(--border);
  border-radius: 4px;
  overflow: hidden;
  margin: 8px 0;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--orange), var(--orange-glow));
  border-radius: 4px;
  transition: width 0.5s ease;
}

/* Paywall */
.paywall-banner {
  background: linear-gradient(135deg, rgba(243,156,18,0.15), rgba(52,152,219,0.15));
  border: 1px solid var(--orange);
  border-radius: var(--radius);
  padding: 20px;
  text-align: center;
  margin: 20px 0;
}
.paywall-price { font-size: 2rem; font-weight: 800; color: var(--orange); }
.unlock-input {
  padding: 10px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-size: 0.9rem;
  width: 200px;
  text-align: center;
  margin-right: 8px;
}

/* Settings modal */
.settings-form { display: flex; flex-direction: column; gap: 12px; }
.settings-form label { font-weight: 600; color: var(--blue); font-size: 0.9rem; }
.settings-form input {
  padding: 10px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-size: 0.9rem;
}

/* Score display */
.score-display {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--green);
}
.timer-display { color: var(--red); font-weight: 700; }

/* Element grid */
.element-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(48px, 1fr));
  gap: 4px;
  max-height: 300px;
  overflow-y: auto;
}
.element-cell {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.7rem;
  font-weight: 700;
  transition: var(--transition);
  color: var(--text2);
}
.element-cell:hover { border-color: var(--orange); color: var(--orange); transform: scale(1.1); }
.element-cell.collected { background: rgba(243,156,18,0.2); border-color: var(--orange); color: var(--orange); }

/* Toast */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--green);
  color: #fff;
  padding: 10px 24px;
  border-radius: 20px;
  font-weight: 600;
  z-index: 300;
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2s forwards;
}
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } }
@keyframes toastOut { to { opacity: 0; transform: translateX(-50%) translateY(-20px); } }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text2);
}
.empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

/* Equation display */
.equation {
  font-family: "Courier New", monospace;
  font-size: 1.1rem;
  padding: 8px 12px;
  background: var(--bg);
  border-radius: 6px;
  text-align: center;
  margin: 4px 0;
}
.equation-input {
  width: 36px;
  padding: 4px 6px;
  text-align: center;
  background: var(--bg3);
  border: 1px solid var(--orange);
  border-radius: 4px;
  color: var(--text);
  font-size: 0.95rem;
  font-family: "Courier New", monospace;
}

/* Carbon transform */
.carbon-canvas-area { position: relative; width: 100%; height: 200px; background: var(--bg); border-radius: 8px; overflow: hidden; }
.carbon-node {
  position: absolute;
  width: 16px;
  height: 16px;
  background: var(--orange);
  border-radius: 50%;
  transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 0 8px rgba(243,156,18,0.6);
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <div class="logo neon-text">🔥 夜市学堂</div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchSubject('bio')">🧬 生物七上</button>
      <button class="nav-tab" onclick="switchSubject('chem')">⚗️ 化学九上</button>
    </div>
    <button class="settings-btn" onclick="toggleSettings()">⚙️ 设置</button>
  </div>
</header>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal" style="max-width:450px">
    <div class="modal-header">
      <h3>⚙️ 设置</h3>
      <button class="modal-close" onclick="toggleSettings()">✕</button>
    </div>
    <div class="modal-body">
      <div class="settings-form">
        <label>DeepSeek API Key</label>
        <input type="password" id="apiKeyInput" placeholder="sk-xxxxxxxxxxxxxxxx">
        <small style="color:var(--text2)">用于AI大厨阿火的聊天功能。密钥仅保存在本地浏览器。</small>
        <button class="btn btn-orange" onclick="saveApiKey()">保存密钥</button>
        <hr style="border-color:var(--border);margin:8px 0">
        <label>解锁码（付费用户）</label>
        <div style="display:flex;gap:8px">
          <input type="text" id="unlockCodeInput" placeholder="输入解锁码" style="flex:1;padding:10px 16px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:0.9rem">
          <button class="btn btn-outline" onclick="applyUnlockCode()">激活</button>
        </div>
        <small style="color:var(--text2)">购买后获得解锁码，可解锁全部内容和游戏。</small>
      </div>
    </div>
  </div>
</div>

<!-- Main Content -->
<div class="main-container">
  <!-- Left Column: Knowledge Cards + Quiz -->
  <div>
    <div class="section open" id="knowledgeSection">
      <div class="section-header" onclick="toggleSection('knowledgeSection')">
        <span class="icon">📚</span>
        <h2>知识卡片</h2>
        <span class="arrow">▼</span>
      </div>
      <div class="section-body">
        <div class="knowledge-list" id="knowledgeList"></div>
      </div>
    </div>
  </div>

  <!-- Right Column: AI Chat + Games -->
  <div>
    <div class="section open" id="chatSection">
      <div class="section-header" onclick="toggleSection('chatSection')">
        <span class="icon">👨‍🍳</span>
        <h2>夜市大厨阿火</h2>
        <span class="arrow">▼</span>
      </div>
      <div class="section-body">
        <div class="chat-container" id="chatContainer">
          <div class="chat-messages" id="chatMessages">
            <div class="chat-bubble bot">
              嘿，小伙子/小姑娘！我是夜市大厨阿火，在这夜市摆摊20年了。<br>有啥生物化学上的问题？用夜市里的玩意儿给你讲明白！
            </div>
          </div>
          <div class="chat-input-area">
            <input class="chat-input" id="chatInput" placeholder="问阿火一个问题..." onkeydown="if(event.key==='Enter')sendMessage()">
            <button class="chat-send" id="chatSendBtn" onclick="sendMessage()">发送</button>
          </div>
        </div>
      </div>
    </div>

    <div style="margin-top:20px" class="section open" id="gamesSection">
      <div class="section-header" onclick="toggleSection('gamesSection')">
        <span class="icon">🎮</span>
        <h2>沙盘游戏</h2>
        <span class="arrow">▼</span>
      </div>
      <div class="section-body">
        <div class="games-grid" id="gamesGrid"></div>
      </div>
    </div>
  </div>
</div>

<!-- Paywall Banner -->
<div class="paywall-banner" id="paywallBanner">
  <h3>🔒 解锁全部内容</h3>
  <p style="margin:8px 0;color:var(--text2)">免费用户可访问前3个知识卡片和1个游戏</p>

  {"id":"bio-2-1-1","unit":"第二单元 多种多样的生物","chapter":"第一章 藻类与植物的类群","section":"第一节 藻类、苔藓植物和蕨类植物","page":"P62-66","category":"bio","keypoints":["无种子植物进化：藻类→苔藓→蕨类","藻类（水生/无根茎叶分化）","苔藓（有茎叶无真根/空气质量指示植物）","蕨类（有根茎叶/孢子繁殖）","鱼缸绿膜是藻类"],"examPoints":["三类植物区别和代表","苔藓作为空气指示植物"],"textbookColumns":["「想一想」鱼缸绿膜怎么来的？","「观察·思考」藻类/苔藓/蕨类结构比较"],"nightMarketCase":"蕨菜烤肉卷：夜市蕨菜=蕨类植物——比种子植物更古老的活化石。紫菜海带=藻类","gameDesign":"「植物进化时间轴」：点击不同地质年代出现对应植物代表，藻类→苔藓→蕨类逐步解锁","gameType":"timeline-click","free":false,"quiz":[{"q":"以下哪类植物可以作为空气质量的指示植物？","options":["A.藻类","B.苔藓植物","C.蕨类植物","D.种子植物"],"answer":1,"explanation":"苔藓植物叶片只有一层细胞，对空气污染敏感，是良好的空气指示植物。"},{"q":"鱼缸壁上的绿膜是什么？","options":["A.苔藓","B.霉菌","C.藻类","D.细菌"],"answer":2,"explanation":"鱼缸绿膜是藻类大量繁殖形成的，藻类需要阳光和水中的营养。"}]},
  {"id":"bio-2-1-2","unit":"第二单元 多种多样的生物","chapter":"第一章 藻类与植物的类群","section":"第二节 种子植物","page":"P67-73","category":"bio","keypoints":["种子结构：种皮+胚（胚芽/胚轴/胚根/子叶）+胚乳","菜豆（双子叶/无胚乳）vs玉米（单子叶/有胚乳）","裸子植物（松/银杏/种子裸露无果皮）","被子植物（有果皮/最高等植物）"],"examPoints":["种子结构","裸子vs被子","单双子叶区别"],"textbookColumns":["「实验·探究」观察菜豆和玉米种子结构","「练习」松球果不是果实"],"nightMarketCase":"糖炒栗子（被子/有果皮）vs烤松子（裸子/种子裸露）——一口吃出进化差别","gameDesign":"「种子解剖台」：虚拟解剖菜豆和玉米种子，拖拽标签标注各结构，碘液染色后胚乳变蓝","gameType":"drag-label","free":false,"quiz":[{"q":"裸子植物和被子植物的主要区别是什么？","options":["A.有无根","B.有无茎","C.种子外有无果皮包被","D.有无叶"],"answer":2,"explanation":"裸子植物种子裸露无果皮包被（如松子），被子植物种子有果皮包被（如苹果）。"},{"q":"菜豆种子属于什么类型？","options":["A.单子叶有胚乳","B.双子叶无胚乳","C.单子叶无胚乳","D.裸子植物"],"answer":1,"explanation":"菜豆是双子叶植物，种子无胚乳，营养物质储存在子叶中。"}]},
  {"id":"bio-2-2-1","unit":"第二单元 多种多样的生物","chapter":"第二章 动物的类群","section":"第一节 无脊椎动物","page":"P74-81","category":"bio","keypoints":["无脊椎动物类群：腔肠/扁形/线形/环节/软体/节肢","节肢动物是最大动物类群","鲍鱼和鱿鱼=软体动物不是鱼"],"examPoints":["各类群特征","节肢动物特点","区分软体vs鱼类"],"textbookColumns":["「想一想」鲍鱼和鱿鱼为什么不是鱼？"],"nightMarketCase":"夜市虾蟹=节肢动物（身体分节/外骨骼/足分节）。鱿鱼=软体动物不是鱼","gameDesign":"「动物分类大闯关」：从腔肠→扁形→线形→环节→软体→节肢逐级解锁","gameType":"level-unlock","free":false,"quiz":[{"q":"为什么鲍鱼和鱿鱼不是鱼？","options":["A.它们不会游泳","B.它们属于软体动物","C.它们没有鳍","D.它们是两栖动物"],"answer":1,"explanation":"鲍鱼和鱿鱼属于软体动物门，身体柔软，与鱼类（脊椎动物）是完全不同的类群。"},{"q":"动物界中最大的类群是？","options":["A.软体动物","B.环节动物","C.节肢动物","D.脊椎动物"],"answer":2,"explanation":"节肢动物是动物界种类最多、数量最大的类群，包括昆虫、虾蟹、蜘蛛等。"}]},
  {"id":"bio-2-2-2","unit":"第二单元 多种多样的生物","chapter":"第二章 动物的类群","section":"第二节 脊椎动物","page":"P82-97","category":"bio","keypoints":["鱼（鳃呼吸/体表鳞/四大家鱼：青草鲢鳙）","两栖（幼体水生鳃→成体肺+皮肤）","爬行（肺呼吸/体表鳞甲/陆地产卵）","鸟（肺+气囊双重呼吸/体表羽/恒温）","哺乳（胎生哺乳/体表毛/恒温）"],"examPoints":["五类脊椎动物特征和代表","进化顺序","恒温vs变温"],"textbookColumns":["「观察·思考」鱼/蛙/蜥蜴/鸟/哺乳动物特征比较","「练习」鸟双重呼吸"],"nightMarketCase":"夜市一摊可巡礼五类脊椎动物：鱼→蛙腿→蛇肉串→鸽子→羊肉串","gameDesign":"「脊椎动物进化跑道」：五类动物按进化排列跑道，点击查看特征卡片","gameType":"click-learn","free":false,"quiz":[{"q":"以下哪类动物是恒温动物？","options":["A.鱼和蛙","B.鸟和哺乳动物","C.蛇和蜥蜴","D.鱼和爬行动物"],"answer":1,"explanation":"鸟类和哺乳动物是恒温动物，鱼类、两栖类和爬行类都是变温动物。"},{"q":"鸟类双重呼吸的\"双重\"指的是？","options":["A.两个鼻孔同时呼吸","B.肺和气囊共同参与","C.吸气和呼气都能呼吸","D.有两个肺"],"answer":1,"explanation":"鸟类有气囊与肺相连，飞行时气囊辅助呼吸，实现高效的气体交换。"}]},
  {"id":"bio-2-3-1","unit":"第二单元 多种多样的生物","chapter":"第三章 微生物","section":"第一节 微生物的分布","page":"P98-102","category":"bio","keypoints":["微生物=个体微小/结构简单的生物统称","细菌和真菌广泛分布","菌落：细菌（小/光滑/颜色浅）vs真菌（大/绒毛状/多彩）","生存条件：水/适宜温度/有机物"],"examPoints":["微生物概念","菌落区别","分布特点"],"textbookColumns":["「实验·探究」检测环境中的细菌和真菌","「练习」真空包装防腐败"],"nightMarketCase":"用培养基检测夜市不同位置的微生物——砧板vs洗后蔬菜vs手","gameDesign":"「微生物侦探」：在不同场景虚拟取样→培养→对比菌落数量→排名积分","gameType":"click-compare","free":false,"quiz":[{"q":"细菌菌落和真菌菌落外观上最大的区别是什么？","options":["A.颜色相同","B.细菌菌落小且光滑，真菌菌落大且绒毛状","C.细菌菌落更大","D.没有区别"],"answer":1,"explanation":"细菌菌落一般较小、表面光滑、颜色较浅；真菌菌落较大、呈绒毛状或絮状、颜色多样。"},{"q":"微生物生存不需要的条件是？","options":["A.水","B.适宜温度","C.有机物","D.阳光"],"answer":3,"explanation":"大多数微生物不需要阳光，它们需要水、适宜温度和有机物即可生存繁殖。"}]},
  {"id":"bio-2-3-2","unit":"第二单元 多种多样的生物","chapter":"第三章 微生物","section":"第二节 细菌","page":"P103-108","category":"bio","keypoints":["细菌形态：球菌/杆菌/螺旋菌","结构：细胞壁/膜/质/DNA（无真正核膜→原核生物）","有些有荚膜（保护）/鞭毛（运动）","分裂繁殖极快","芽孢=休眠体（非繁殖体）","有益（酸奶/泡菜）和有害（致病）"],"examPoints":["细菌形态结构","原核vs真核","分裂繁殖","芽孢"],"textbookColumns":["「科学·技术·社会」巴斯德与巴氏消毒法"],"nightMarketCase":"夜市放久食物发臭变黏——细菌大量繁殖。乳酸菌做酸奶=有益菌","gameDesign":"「细菌繁殖速度挑战」：1个细菌20分钟分裂1次，计算3小时后数量→展示指数增长","gameType":"calc-quiz","free":false,"quiz":[{"q":"细菌属于什么类型的生物？","options":["A.真核生物","B.原核生物","C.病毒","D.真菌"],"answer":1,"explanation":"细菌没有成形的细胞核（无核膜），遗传物质DNA集中在核区，属于原核生物。"},{"q":"细菌的芽孢是什么？","options":["A.繁殖体","B.休眠体","C.营养器官","D.运动器官"],"answer":1,"explanation":"芽孢是细菌在恶劣环境下的休眠体，不是繁殖体——一个细菌只形成一个芽孢。"}]},
  {"id":"bio-2-3-3","unit":"第二单元 多种多样的生物","chapter":"第三章 微生物","section":"第三节 真菌","page":"P109-113","category":"bio","keypoints":["真菌=真核生物","酵母菌（单细胞/出芽生殖）","霉菌（多细胞/菌丝/孢子繁殖）","蘑菇木耳（大型真菌）","腐乳=毛霉功劳","橘子发霉=青霉"],"examPoints":["真菌与细菌区别","酵母菌/霉菌特征","发酵应用"],"textbookColumns":["「实验·探究」观察酵母菌和霉菌","「练习」蘑菇不是植物"],"nightMarketCase":"发面靠酵母菌——分解葡萄糖产生CO₂使面团膨胀。腐乳=毛霉发酵","gameDesign":"「发酵食品工坊」：选择食材+微生物，制作发酵食品（馒头/酸奶/酱油/葡萄酒）","gameType":"choice-simulate","free":false,"quiz":[{"q":"真菌与细菌最本质的区别是什么？","options":["A.大小不同","B.真菌有真正的细胞核（真核），细菌没有","C.真菌会动","D.细菌更大"],"answer":1,"explanation":"真菌是真核生物，有成形的细胞核；细菌是原核生物，没有真正的细胞核。"},{"q":"蘑菇属于什么生物类群？","options":["A.植物","B.动物","C.真菌","D.细菌"],"answer":2,"explanation":"蘑菇属于真菌（大型真菌），不是植物——真菌没有叶绿体，不能进行光合作用。"}]},
  {"id":"bio-2-3-4","unit":"第二单元 多种多样的生物","chapter":"第三章 微生物","section":"第四节 病毒","page":"P114-119","category":"bio","keypoints":["病毒无细胞结构=蛋白质外壳+DNA或RNA","必须寄生活细胞","伊万诺夫斯基发现烟草花叶病毒","分类：动物/植物/细菌病毒（噬菌体）","HIV侵入细胞","有益：噬菌体治疗"],"examPoints":["病毒结构特点","与细胞关系","噬菌体","发现史"],"textbookColumns":["「资料分析」烟草花叶病毒发现史","「练习」病毒不能独立生活"],"nightMarketCase":"病毒比细菌更小，肉眼完全看不见——洗手是防御病毒的第一道防线","gameDesign":"「病毒入侵模拟」：播放病毒识别→注入→复制→释放动画，关键步骤暂停答题","gameType":"video-quiz","free":false,"quiz":[{"q":"病毒的结构组成是什么？","options":["A.细胞壁+细胞膜","B.蛋白质外壳+遗传物质（DNA或RNA）","C.细胞核+细胞质","D.只有蛋白质"],"answer":1,"explanation":"病毒没有细胞结构，仅由蛋白质外壳和内部的遗传物质（DNA或RNA）组成。"},{"q":"病毒能独立生活吗？","options":["A.能","B.不能，必须寄生在活细胞中","C.有时能有时不能","D.在空气中能"],"answer":1,"explanation":"病毒不能独立生活，必须寄生在活细胞中才能进行复制。"}]},

const ALL_KNOWLEDGE = [...BIO_DATA, ...CHEM_DATA];

// ========== STATE ==========
let currentSubject = 'bio';
let isPaid = false;
let apiKey = '';
let quizScores = {};

// ========== INIT ==========
function init() {
  loadState();
  renderKnowledgeCards();
  renderGames();
  updatePaywall();
}

function loadState() {
  isPaid = localStorage.getItem('bioChemPaid') === 'true';
  apiKey = localStorage.getItem('bioChemApiKey') || '';
  try { quizScores = JSON.parse(localStorage.getItem('bioChemScores') || '{}'); } catch(e) { quizScores = {}; }
  document.getElementById('apiKeyInput').value = apiKey;
}

function saveState() {
  localStorage.setItem('bioChemPaid', isPaid);
  localStorage.setItem('bioChemApiKey', apiKey);
  localStorage.setItem('bioChemScores', JSON.stringify(quizScores));
}

// ========== NAVIGATION ==========
function switchSubject(subj) {
  currentSubject = subj;
  document.querySelectorAll('.nav-tab').forEach((tab, i) => {
    tab.classList.toggle('active', (i === 0 && subj === 'bio') || (i === 1 && subj === 'chem'));
  });
  renderKnowledgeCards();
  document.getElementById('knowledgeSection').classList.add('open');
}

// ========== SECTION TOGGLE ==========
function toggleSection(id) {
  document.getElementById(id).classList.toggle('open');
}

// ========== SETTINGS ==========
function toggleSettings() {
  document.getElementById('settingsModal').classList.toggle('show');
  document.getElementById('apiKeyInput').value = apiKey;
}

function saveApiKey() {
  apiKey = document.getElementById('apiKeyInput').value.trim();
  saveState();
  toggleSettings();
  showToast('API密钥已保存');
}

function applyUnlockCode() {
  const code = (document.getElementById('unlockCodeInput').value || document.getElementById('paywallUnlockInput').value || '').trim();
  if (code === 'NIGHTSCHOOL2026' || code === 'YESHIXUETANG') {
    isPaid = true;
    saveState();
    renderKnowledgeCards();
    renderGames();
    updatePaywall();
    showToast('解锁成功！全部内容已开放');
    toggleSettings();
  } else if (code) {
    showToast('解锁码无效，请检查后重试', true);
  }
}

// ========== PAYWALL ==========
function updatePaywall() {
  const banner = document.getElementById('paywallBanner');
  if (isPaid) {
    banner.innerHTML = '<div style="text-align:center;color:var(--green);font-weight:700;font-size:1.1rem">✅ 已解锁全部内容 — 享受学习吧！</div>';
  }
}

function isAccessible(card) {
  if (isPaid) return true;
  if (card.free) return true;
  const data = currentSubject === 'bio' ? BIO_DATA : CHEM_DATA;
  const freeCards = data.filter(c => c.free);
  return data.indexOf(card) < freeCards.length;
}

// ========== KNOWLEDGE CARDS ==========
function renderKnowledgeCards() {
  const data = currentSubject === 'bio' ? BIO_DATA : CHEM_DATA;
  const container = document.getElementById('knowledgeList');

function toggleCard(id) {
  const card = document.getElementById('kcard-' + id);

}

function renderQuizInCard(card) {
  let html = '<div class="quiz-section"><div style="font-weight:700;color:var(--orange);margin-bottom:8px">📝 随堂测验</div>';
  card.quiz.forEach((q, qi) => {
    const qid = `quiz-${card.id}-${qi}`;
    const answered = quizScores[qid] !== undefined;
    html += `<div class="quiz-question" id="${qid}">
      <div class="quiz-q-text">${qi + 1}. ${q.q}</div>
      <div class="quiz-options">${q.options.map((opt, oi) => `
        <div class="quiz-opt ${answered ? (oi === q.answer ? 'correct' : (quizScores[qid] === oi ? 'wrong' : '')) : ''}" 
             onclick="${answered ? '' : `answerQuiz('${card.id}', ${qi}, ${oi}, ${q.answer}, '${qid}')`}">
          ${opt}
        </div>
      `).join('')}</div>
      ${answered ? `<div class="quiz-feedback show ${quizScores[qid] === q.answer ? 'correct' : 'wrong'}">
        ${quizScores[qid] === q.answer ? '✅ 正确！' : '❌ 错误！'} ${q.explanation}
      </div>` : ''}
    </div>`;
  });
  html += '</div>';
  return html;
}

function answerQuiz(cardId, qi, selected, correct, qid) {
  quizScores[qid] = selected;
  saveState();
  // Re-render this card's quiz
  const data = currentSubject === 'bio' ? BIO_DATA : CHEM_DATA;
  const card = data.find(c => c.id === cardId);
  if (!card) return;
  const qEl = document.getElementById(qid);
  if (!qEl) return;
  const opts = qEl.querySelectorAll('.quiz-opt');
  opts.forEach((opt, i) => {
    opt.onclick = null;
    if (i === correct) opt.classList.add('correct');
    if (i === selected && i !== correct) opt.classList.add('wrong');
  });
  const fb = qEl.querySelector('.quiz-feedback') || document.createElement('div');
  if (!qEl.querySelector('.quiz-feedback')) {
    fb.className = 'quiz-feedback show ' + (selected === correct ? 'correct' : 'wrong');
    fb.textContent = (selected === correct ? '✅ 正确！' : '❌ 错误！') + ' ' + card.quiz[qi].explanation;
    qEl.appendChild(fb);
  }
  if (selected === correct) {
    showToast('回答正确！');
  }
}

// ========== AI CHAT ==========
async function sendMessage() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg) return;
  
  if (!apiKey) {
    showToast('请先在设置中配置DeepSeek API Key', true);
    return;
  }
  
  const msgsContainer = document.getElementById('chatMessages');
  const sendBtn = document.getElementById('chatSendBtn');
  
  // Add user message
  msgsContainer.innerHTML += `<div class="chat-bubble user">${escapeHtml(msg)}</div>`;
  input.value = '';
  
  // Add loading bubble
  const loadId = 'load-' + Date.now();
  msgsContainer.innerHTML += `<div class="chat-bubble bot loading" id="${loadId}">阿火在想怎么用夜市说清楚...</div>`;
  msgsContainer.scrollTop = msgsContainer.scrollHeight;
  
  sendBtn.disabled = true;
  input.disabled = true;
  
  try {
    const systemPrompt = `你是「夜市大厨阿火」，一个在夜市摆摊20年的老厨师，同时也是生物化学知识的隐藏大师。
性格：说话像老厨师给徒弟支招——直接、实用、接地气。常用夜市食材/现象类比知识点。
规则：1.先用夜市场景类比（1-2句），再用教科书语言解释 2.每个回答必须包含一个"夜市实例" 3.回答200字以内 4.超出课程范围礼貌引导回来
知识范围：生物人教版2024版七年级上册（2单元7章）+ 化学人教版2024版九年级上册（7单元22课题）
回答格式：不要用markdown，直接说。`;

    const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + apiKey
      },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: msg }
        ],
        max_tokens: 400,
        temperature: 0.8
      })
    });
    
    const data = await response.json();
    document.getElementById(loadId).remove();
    
    if (data.choices && data.choices[0]) {
      const reply = data.choices[0].message.content;
      msgsContainer.innerHTML += `<div class="chat-bubble bot">${escapeHtml(reply)}</div>`;
    } else {
      throw new Error(data.error?.message || '未知错误');
    }
  } catch(e) {
    document.getElementById(loadId)?.remove();
    msgsContainer.innerHTML += `<div class="chat-bubble bot" style="color:var(--red)">哎呀，灶台出了点问题：${escapeHtml(e.message)}。检查下API Key对不对？</div>`;
  }
  
  sendBtn.disabled = false;
  input.disabled = false;
  msgsContainer.scrollTop = msgsContainer.scrollHeight;
  input.focus();
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function initGame1() {
  let correct = 0, total = 8;
  const items = document.querySelectorAll('#g1-items .drag-item');
  const zones = document.querySelectorAll('.drop-zone');
  
  items.forEach(item => {
    item.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', e.target.dataset.cat);
      e.target.classList.add('dragging');
    });
    item.addEventListener('dragend', e => { e.target.classList.remove('dragging'); });
    // Touch support
    item.addEventListener('touchstart', function(e) {
      this._touchData = { cat: this.dataset.cat, el: this };
    });
  });
  
  zones.forEach(zone => {
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', () => { zone.classList.remove('drag-over'); });
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      const cat = e.dataTransfer.getData('text/plain');
      const dragged = document.querySelector('.drag-item.dragging');
      if (cat === zone.dataset.cat && dragged) {
        zone.appendChild(dragged);
        dragged.draggable = false;
        dragged.style.background = 'rgba(46,204,113,0.2)';
        dragged.style.borderColor = 'var(--green)';
        correct++;
        if (correct === total) {
          document.getElementById('g1-score').textContent = '🎉 全部正确！你是夜市普查高手！';
        }
      }
    });
    // Touch drop
    zone.addEventListener('touchend', function(e) {
      // Simplified touch - click to classify
    });
  });
  
  // Click-to-classify fallback for mobile
  items.forEach(item => {
    item.addEventListener('click', function() {
      if (this.draggable === false) return;
      const cat = this.dataset.cat;
      const zone = document.getElementById('g1-' + cat);
      if (zone) {
        zone.appendChild(this);
        this.draggable = false;
        this.style.background = 'rgba(46,204,113,0.2)';
        this.style.borderColor = 'var(--green)';
        this.style.cursor = 'default';
        correct++;
        if (correct === total) {
          document.getElementById('g1-score').textContent = '🎉 全部正确！你是夜市普查高手！';
        }
      }
    });
  });
}

function updateG3() {

  const temp = parseInt(document.getElementById('g3-temp').value);

  document.getElementById('g3-temp-val').textContent = temp + '°C';
  
  let skewerEmoji = '🍢';
  let feedback = '';
  let detail = '';
  let score = 0;
  
  // Score each dimension
  const fuelOk = fuel >= 65 && fuel <= 85;
  const o2Ok = o2 >= 55 && o2 <= 85;
  const tempOk = temp >= 170 && temp <= 230;
  
  if (fuelOk && o2Ok && tempOk) {
    skewerEmoji = '🍖';
    feedback = '🎉 完美！烤串金黄酥脆，外焦里嫩！';

    detail = '两个要素达标了，再看看第三个。';
    score = 66;
  } else if (fuelOk || o2Ok || tempOk) {
    feedback = '😐 还差得远，烤串不太对劲...';
    detail = '只有一个要素达标，继续调整！';
    score = 33;
  } else {
    skewerEmoji = '🥩';
    feedback = '🧊 生肉！完全没烤好！';
    detail = '燃烧三要素都不满足。想想看：炭不够、没鼓风、温度太低...';
    score = 0;
  }
  
  if (fuel > 90) detail += ' 炭太多了，会烤焦！';
  if (o2 > 90) detail += ' 氧气太多，火太旺！';
  if (temp > 260) detail += ' 温度太高，烤串要糊了！';
  if (fuel < 30) detail += ' 炭不够！';
  if (o2 < 30) detail += ' 氧气不足，火要灭了！';
  
  document.getElementById('g3-skewer').textContent = skewerEmoji;
  document.getElementById('g3-feedback').textContent = feedback;
  document.getElementById('g3-detail').textContent = detail;
}

// === GAME 4: Change classification quiz ===
function renderGame4() {
  return `<p style="color:var(--text2);margin-bottom:12px">快速判断：这是物理变化还是化学变化？</p>
    <div style="text-align:center;font-size:2rem;margin:16px 0" id="g4-question"></div>
    <div style="display:flex;gap:12px;justify-content:center">
      <button class="btn btn-blue" onclick="answerG4('physical')">🔄 物理变化</button>
      <button class="btn btn-orange" onclick="answerG4('chemical')">⚗️ 化学变化</button>
    </div>
    <div style="text-align:center;margin-top:12px">
      <span class="score-display">得分: <span id="g4-score">0</span></span>
      <span style="margin-left:16px" class="timer-display">⏱ <span id="g4-timer">5</span>s</span>
    </div>
    <div id="g4-feedback" style="text-align:center;margin-top:8px;font-weight:600"></div>
    <div style="text-align:center;margin-top:8px;font-size:0.82rem;color:var(--text2)">连击: <span id="g4-streak">0</span></div>`;
}

let g4Data, g4Index, g4Score, g4Streak, g4Timer, g4Interval;

function initGame4() {
  g4Data = [
    { q: '木炭在烤炉中燃烧', a: 'chemical' },
    { q: '冰块融化成水', a: 'physical' },
    { q: '铁签生锈', a: 'chemical' },
    { q: '烤肉表面变褐色（美拉德反应）', a: 'chemical' },
    { q: '把木炭敲碎', a: 'physical' },
    { q: '面团发酵膨大', a: 'chemical' },
    { q: '盐溶解在水中', a: 'physical' },
    { q: '酒精灯中的酒精挥发', a: 'physical' },
    { q: '生石灰加水放热', a: 'chemical' },
    { q: '水沸腾变成水蒸气', a: 'physical' },
    { q: '牛奶变酸', a: 'chemical' },
    { q: '玻璃被打碎', a: 'physical' }
  ];
  g4Index = 0;
  g4Score = 0;
  g4Streak = 0;
  shuffle(g4Data);
  updateG4Display();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function updateG4Display() {
  if (g4Index >= g4Data.length) {
    document.getElementById('g4-question').textContent = '🎉 全部完成！';
    document.getElementById('g4-feedback').textContent = '最终得分: ' + g4Score;
    clearInterval(g4Interval);
    return;
  }
  document.getElementById('g4-question').textContent = g4Data[g4Index].q;
  document.getElementById('g4-score').textContent = g4Score;
  document.getElementById('g4-streak').textContent = g4Streak;
  document.getElementById('g4-feedback').textContent = '';
  
  let timeLeft = 5 + Math.max(0, 5 - g4Streak);
  document.getElementById('g4-timer').textContent = timeLeft;
  clearInterval(g4Interval);
  g4Interval = setInterval(() => {
    timeLeft--;
    document.getElementById('g4-timer').textContent = timeLeft;
    if (timeLeft <= 0) {
      clearInterval(g4Interval);
      document.getElementById('g4-feedback').textContent = '⏰ 时间到！正确答案是：' + (g4Data[g4Index].a === 'chemical' ? '化学变化' : '物理变化');
      g4Streak = 0;
      g4Index++;
      setTimeout(updateG4Display, 1500);
    }
  }, 1000);
}

function answerG4(answer) {
  clearInterval(g4Interval);
  const correct = g4Data[g4Index].a;
  if (answer === correct) {
    g4Score += 10 + g4Streak * 5;
    g4Streak++;
    document.getElementById('g4-feedback').textContent = '✅ 正确！+' + (10 + (g4Streak - 1) * 5) + '分';
  } else {
    document.getElementById('g4-feedback').textContent = '❌ 错误！正确答案是：' + (correct === 'chemical' ? '化学变化' : '物理变化');
    g4Streak = 0;
  }
  g4Index++;
  setTimeout(updateG4Display, 800);
}

function renderGame5() {
  return `<p style="color:var(--text2);margin-bottom:12px">填写化学方程式中的系数（空白处填数字）</p>
    <div id="g5-equations"></div>

}

function initGame5() {
  const eqs = [
    { display: '<span class="equation-input" id="g5-c1"></span>H₂ + <span class="equation-input" id="g5-c2"></span>O₂ → <span class="equation-input" id="g5-c3"></span>H₂O', answers: ['2', '1', '2'], desc: '氢气燃烧生成水' },
    { display: '<span class="equation-input" id="g5-c4"></span>KMnO₄ → <span class="equation-input" id="g5-c5"></span>K₂MnO₄ + <span class="equation-input" id="g5-c6"></span>MnO₂ + O₂↑', answers: ['2', '1', '1'], desc: '高锰酸钾分解' },
    { display: '<span class="equation-input" id="g5-c7"></span>Fe + <span class="equation-input" id="g5-c8"></span>O₂ → Fe₃O₄', answers: ['3', '2'], desc: '铁丝在氧气中燃烧' },
    { display: '<span class="equation-input" id="g5-c9"></span>CH₄ + <span class="equation-input" id="g5-c10"></span>O₂ → CO₂ + <span class="equation-input" id="g5-c11"></span>H₂O', answers: ['1', '2', '2'], desc: '甲烷燃烧' }
  ];
  
  let html = '';
  eqs.forEach((eq, i) => {
    html += `<div style="margin-bottom:16px;background:var(--bg);padding:12px;border-radius:8px">
      <div style="font-size:0.82rem;color:var(--blue);margin-bottom:6px">${eq.desc}</div>
      <div style="font-size:1.1rem;text-align:center;font-family:'Courier New',monospace">${eq.display}</div>
    </div>`;
  });
  html += '<div style="text-align:center"><button class="btn btn-orange" onclick="checkG5()">检查答案</button></div>';
  document.getElementById('g5-equations').innerHTML = html;
  
  // Store answers for checking
  window._g5data = eqs;
}

function checkG5() {
  let allCorrect = true;
  const eqs = window._g5data;
  let c = 1;
  eqs.forEach(eq => {
    eq.answers.forEach(ans => {
      const el = document.getElementById('g5-c' + c);
      if (el) {
        if (el.value.trim() === ans) {
          el.style.borderColor = 'var(--green)';
          el.style.background = 'rgba(46,204,113,0.15)';
        } else {
          el.style.borderColor = 'var(--red)';
          el.style.background = 'rgba(231,76,60,0.15)';
          allCorrect = false;
        }
      }
      c++;
    });
  });
  document.getElementById('g5-result').textContent = allCorrect ? '🎉 全部配平正确！化学配平大师！' : '还有错误，标红的系数需要修改。';
  document.getElementById('g5-result').style.color = allCorrect ? 'var(--green)' : 'var(--red)';
}

// === GAME 8: Carbon transformation ===
function renderGame8() {
  return `<p style="color:var(--text2);margin-bottom:12px">点击按钮变换碳原子的排列方式，看碳的三种"变身"！</p>
    <div class="carbon-canvas-area" id="g8-canvas">
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--text2)">点击下方按钮开始</div>
    </div>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap">
      <button class="btn btn-blue" onclick="transformG8('diamond')">💎 金刚石<br><small>正四面体</small></button>
      <button class="btn btn-orange" onclick="transformG8('graphite')">✏️ 石墨<br><small>层状结构</small></button>
      <button class="btn" style="background:var(--green);color:#fff" onclick="transformG8('c60')">⚽ C₆₀<br><small>足球烯</small></button>
    </div>
    <div id="g8-info" style="text-align:center;margin-top:12px;font-weight:600;color:var(--blue)"></div>`;
}

function initGame8() {
  // Will be rendered by transformG8
}

function transformG8(type) {
  const canvas = document.getElementById('g8-canvas');
  const info = document.getElementById('g8-info');
  let nodes = '';
  const w = canvas.offsetWidth || 400;
  const h = 200;
  const cx = w / 2, cy = h / 2;
  
  switch(type) {
    case 'diamond':
      // Tetrahedral arrangement - 5 nodes showing tetrahedral pattern
      const positions = [
        { x: cx, y: cy - 30 },
        { x: cx - 35, y: cy + 25 },
        { x: cx + 35, y: cy + 25 },
        { x: cx - 18, y: cy - 60 },
        { x: cx + 18, y: cy - 60 }
      ];
      positions.forEach((p, i) => {
        nodes += `<div class="carbon-node" style="left:${p.x - 8}px;top:${p.y - 8}px;animation-delay:${i * 0.1}s"></div>`;
      });
      info.innerHTML = '<strong>💎 金刚石</strong> — 碳原子正四面体排列，每个碳与4个碳形成共价键。自然界最硬的物质！';
      break;
    case 'graphite':
      // Layered structure
      for (let layer = 0; layer < 3; layer++) {
        for (let i = 0; i < 4; i++) {
          nodes += `<div class="carbon-node" style="left:${cx - 36 + i * 24 - 8}px;top:${cy - 20 + layer * 30 - 8}px;animation-delay:${(layer * 4 + i) * 0.05}s"></div>`;
        }
      }
      info.innerHTML = '<strong>✏️ 石墨</strong> — 碳原子层状排列，层与层之间易滑动。可以做铅笔芯和润滑剂！';
      break;
    case 'c60':
      // Spherical - approximate with circle of nodes
      for (let i = 0; i < 12; i++) {
        const angle = (i / 12) * Math.PI * 2;
        const r = 35;
        nodes += `<div class="carbon-node" style="left:${cx + Math.cos(angle) * r - 8}px;top:${cy + Math.sin(angle) * r - 8}px;animation-delay:${i * 0.08}s"></div>`;
      }
      info.innerHTML = '<strong>⚽ C₆₀（足球烯）</strong> — 60个碳原子排列成足球形状。纳米材料的新星！';
      break;
  }
  
  canvas.innerHTML = nodes;
}

// ========== TOAST ==========
function showToast(msg, isError) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.style.background = isError ? 'var(--red)' : 'var(--green)';
  toast.textContent = msg;
  document.body.appendChild(toast);
  
  setTimeout(() => toast.remove(), 2500);
}
